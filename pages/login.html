<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />

      darkMode: "class",

        extend: {

            "background": "#121416", "surface": "#121416", "on-background": "#e2e2e5", "surface-container-high": "#282a2c",
            "on-primary-fixed": "#001a41", "surface-bright": "#37393b", "on-primary-container": "#00285c",
            "on-surface": "#e2e2e5", "on-secondary": "#003914", "on-primary": "#002e69",
            "surface-container-lowest": "#0c0e10", "secondary": "var(--brand-secondary)", "primary-fixed": "#d8e2ff",
            "on-tertiary": "#690002", "inverse-primary": "#005ac1", "error": "#ffb4ab",
            "surface-container-highest": "#333537", "inverse-surface": "#e2e2e5", "primary-fixed-dim": "#adc6ff",
            "tertiary": "#ffb4a9", "tertiary-container": "#ff5544", "on-error": "#690005", "outline": "#8c909f",
            "primary-container": "#4d8efe", "primary": "var(--brand-primary)", "surface-variant": "#333537"
          },
          fontFamily: { "headline": ["Plus Jakarta Sans"], "body": ["Manrope"], "label": ["Manrope"] },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    /* Hide scrollbar but keep scroll */
    * {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    *::-webkit-scrollbar {
      display: none;
    }

    .glass-card {
      background: rgba(30, 32, 34, 0.65);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(140, 144, 159, 0.1);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    #dotCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-color: #121416;
    }
  </style>
</head>

<body
  class="bg-background font-body text-on-surface selection:bg-primary/30 min-h-screen overflow-y-auto flex items-center justify-center py-6">
  <canvas id="dotCanvas"></canvas>

  <main class="relative z-10 w-full max-w-sm px-5">
    <!-- Logo -->
    <header class="mb-7 flex justify-center">
      <div class="flex items-center gap-2">
        <div
          class="w-9 h-9 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-lg shadow-primary/20">
          <span class="brand-icon material-symbols-outlined text-on-primary-container text-lg">hub</span>
        </div>
        <h1 class="brand-name font-headline text-2xl font-black text-white tracking-tighter">Finzo</h1>
      </div>
    </header>

    <!-- Login Card -->
    <section class="glass-card rounded-[1.75rem] p-6 shadow-2xl">
      <div class="text-center mb-6">
        <h2 class="font-headline text-xl font-bold text-white tracking-tight mb-1">Welcome Back</h2>
        <p class="text-on-surface-variant font-medium text-xs">Step into the seamless weave of your digital finance.</p>
      </div>

      <form class="space-y-4">
        <!-- Email -->
        <div class="space-y-1">
          <label class="font-label text-[0.6rem] uppercase tracking-widest text-on-surface-variant ml-1">Email
            Address</label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-3.5 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
              <span class="material-symbols-outlined text-base">mail</span>
            </div>
            <input id="loginEmail"
              class="w-full bg-surface-container-highest/30 border-none rounded-xl py-3 pl-10 pr-4 text-sm text-white placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all outline-none"
              placeholder="name@company.com" type="email" required />
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1">
          <div class="flex justify-between items-center ml-1">
            <label class="font-label text-[0.6rem] uppercase tracking-widest text-on-surface-variant">Password</label>
            <a class="text-[0.6rem] font-bold uppercase tracking-wider text-primary hover:text-primary-fixed transition-colors"
              href="#">Forgot Password?</a>
          </div>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-3.5 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
              <span class="material-symbols-outlined text-base">lock</span>
            </div>
            <input id="loginPass"
              class="w-full bg-surface-container-highest/30 border-none rounded-xl py-3 pl-10 pr-10 text-sm text-white placeholder:text-outline focus:ring-2 focus:ring-primary/50 transition-all outline-none"
              placeholder="••••••••" type="password" required />
            <button
              class="absolute inset-y-0 right-3.5 flex items-center text-on-surface-variant hover:text-white transition-colors"
              type="button" onclick="togglePass('loginPass','eye1')">
              <span id="eye1" class="material-symbols-outlined text-base">visibility</span>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button id="loginBtn"
          class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-headline font-extrabold py-3 rounded-xl text-sm shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-300 mt-1"
          type="submit">
          Login to <span class="brand-name">Finzo</span>
        </button>

        <!-- Divider -->
        <div class="relative flex items-center py-1">
          <div class="flex-grow border-t border-outline-variant/30"></div>
          <span class="flex-shrink mx-3 text-on-surface-variant font-label text-[0.55rem] uppercase tracking-[0.2em]">or
            continue with</span>
          <div class="flex-grow border-t border-outline-variant/30"></div>
        </div>

        <!-- Google -->
        <button id="googleLoginBtn"
          class="w-full bg-white text-[#1f1f1f] font-headline font-bold py-3 rounded-xl flex items-center justify-center gap-3 text-sm hover:bg-surface-bright transition-all duration-300 active:scale-95"
          type="button">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z"
              fill="#FBBC05" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335" />
          </svg>
          Google Account
        </button>
      </form>

      <div class="mt-5 text-center">
        <p class="text-xs text-on-surface-variant">
          Don't have an account?
          <a class="text-secondary font-bold hover:underline underline-offset-4 transition-all" href="signup.html">Sign
            Up</a>
        </p>
      </div>
    </section>

    <!-- Footer 
    <footer class="mt-6 text-center">
      <div class="flex justify-center space-x-5 mb-2">
        <a class="font-label text-[0.55rem] uppercase tracking-widest text-on-surface-variant hover:text-white transition-colors"
          href="#">Privacy</a>
        <a class="font-label text-[0.55rem] uppercase tracking-widest text-on-surface-variant hover:text-white transition-colors"
          href="#">Terms</a>
        <a class="font-label text-[0.55rem] uppercase tracking-widest text-on-surface-variant hover:text-white transition-colors"
          href="#">Security</a>
      </div>
      <p class="font-label text-[0.55rem] uppercase tracking-[0.15em] text-outline">© 2024 The Digital Loom.</p>
    </footer>-->
  </main>

  <script>
    function togglePass(id, iconId) {
      const i = document.getElementById(id), ic = document.getElementById(iconId);
      i.type = i.type === 'password' ? 'text' : 'password';
      ic.textContent = i.type === 'password' ? 'visibility' : 'visibility_off';
    }

    const canvas = document.getElementById('dotCanvas');
    const ctx = canvas.getContext('2d');
    let width, height, dots = [];
    const spacing = 32, dotSize = 1.5, mouse = { x: -1000, y: -1000 }, radius = 150;

    function resize() {
      width = window.innerWidth; height = window.innerHeight;
      canvas.width = width; canvas.height = height; initDots();
    }
    function initDots() {
      dots = [];
      for (let x = spacing / 2; x < width; x += spacing)
        for (let y = spacing / 2; y < height; y += spacing)
          dots.push({ x, y });
    }
    function draw() {
      ctx.clearRect(0, 0, width, height);
      dots.forEach(dot => {
        const dx = mouse.x - dot.x, dy = mouse.y - dot.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        let color = '#424753', sz = dotSize;
        if (dist < radius) {
          const f = (radius - dist) / radius, a = 0.15 + f * 0.85;
          color = `rgba(66,133,244,${a})`; sz = dotSize + f * 1.5;
          ctx.beginPath(); ctx.arc(dot.x, dot.y, sz * 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(66,133,244,${f * 0.3})`; ctx.fill();
        }
        ctx.beginPath(); ctx.arc(dot.x, dot.y, sz, 0, Math.PI * 2);
        ctx.fillStyle = color; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    resize(); draw();
  </script>
  <script src="../assets/js/finzo.js"></script>
  <script type="module">
    import { signupWithEmail, loginWithGoogle, redirectIfLoggedIn, auth, onAuthStateChanged } from '../assets/js/auth.js';

    // 🔹 Auto redirect when user is logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "./dashboard.html";
      }
    });

    // Redirect to dashboard if already logged in
    redirectIfLoggedIn('dashboard.html');


    // Redirect to dashboard if already logged in
    redirectIfLoggedIn('dashboard.html');

    const loginBtn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleLoginBtn');
    const form = document.querySelector('form');

    function setLoading(btn, loading, text) {
      btn.disabled = loading;
      btn.style.opacity = loading ? '0.7' : '1';
      btn.textContent = loading ? 'Please wait...' : text;
    }

    // ── Email / Password Login ──
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPass').value;
      setLoading(loginBtn, true, `Login to ${window.brandingConfig?.name || 'Finzo'}`);
      try {
        await loginWithEmail(email, password);
        showToast('Welcome back! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        const msg = {
          'auth/user-not-found': 'No account found with this email.',
          'auth/wrong-password': 'Incorrect password. Try again.',
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/too-many-requests': 'Too many attempts. Try again later.',
          'auth/invalid-credential': 'Invalid email or password.',
        }[err.code] || 'Login failed. Please try again.';
        showToast(msg, 'error');
        setLoading(loginBtn, false, 'Login to Finzo');
      }
    });

    // ── Google Login ──
    googleBtn.addEventListener('click', async () => {
      setLoading(googleBtn, true, 'Google Account');
      try {
        await loginWithGoogle();
        showToast('Signed in with Google!', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') {
          showToast('Google sign-in failed. Try again.', 'error');
        }
        setLoading(googleBtn, false, 'Google Account');
      }
    });
  </script>
</body>

</html>
